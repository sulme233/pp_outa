<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT 支付助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 16px;
    }
    .header {
      text-align: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-size: 12px;
      color: #8892b0;
      margin-top: 4px;
    }
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #64ffda;
    }
    .card-info-input {
      width: 100%;
      min-height: 80px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px;
      color: #fff;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    .card-info-input:focus {
      outline: none;
      border-color: #64ffda;
    }
    .card-info-input::placeholder {
      color: #5a6a8a;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      color: #fff;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-success {
      background: linear-gradient(90deg, #64ffda, #00b894);
      color: #1a1a2e;
    }
    .btn-success:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-danger {
      background: linear-gradient(90deg, #ff6b6b, #ee5a24);
      color: #fff;
    }
    .btn-danger:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .input-group {
      margin-bottom: 8px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #8892b0;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }
    .input-group input:focus {
      outline: none;
      border-color: #64ffda;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row .input-group {
      flex: 1;
    }
    .status-bar {
      margin-top: 12px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
    }
    .status-item {
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-success {
      color: #64ffda;
    }
    .status-error {
      color: #ff6b6b;
    }
    .status-info {
      color: #00d2ff;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label {
      font-size: 13px;
      color: #ccd6f6;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .toggle.active {
      background: #64ffda;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.3s;
    }
    .toggle.active::after {
      left: 22px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ChatGPT 支付助手</h1>
    <p>自动填写卡信息 / 跳转支付链接</p>
  </div>

  <div class="section">
    <div class="section-title">Outlook邮箱配置</div>
    <div style="margin-bottom: 8px;">
      <label style="font-size: 12px; color: #8892b0;">粘贴邮箱信息（自动解析）</label>
      <textarea class="card-info-input" id="rawEmailInfo" placeholder="粘贴邮箱信息，格式：&#10;邮箱----密码----ClientID----RefreshToken"></textarea>
    </div>
    <button class="btn btn-success" id="parseEmailInfo">解析并保存</button>
    <div class="input-group" style="margin-top: 8px;">
      <label>邮箱地址</label>
      <input type="text" id="emailAddress" placeholder="xxx@outlook.com">
    </div>
    <div class="input-group">
      <label>邮箱密码</label>
      <input type="password" id="emailPassword" placeholder="Password">
    </div>
    <div class="input-group">
      <label>Client ID</label>
      <input type="text" id="clientId" placeholder="Client ID">
    </div>
    <div class="input-group">
      <label>Refresh Token</label>
      <input type="text" id="refreshToken" placeholder="Refresh Token">
    </div>
    <button class="btn btn-primary" id="registerGPT">注册ChatGPT账号</button>
  </div>

  <div class="section">
    <div class="section-title">手机号配置</div>
    <div style="margin-bottom: 8px;">
      <label style="font-size: 12px; color: #8892b0;">粘贴手机号信息（自动解析）</label>
      <textarea class="card-info-input" id="rawPhoneInfo" placeholder="粘贴手机号信息，格式：&#10;+15828882140----https://mail-api..."></textarea>
    </div>
    <button class="btn btn-success" id="parsePhoneInfo">解析并保存</button>
    <div class="input-group" style="margin-top: 8px;">
      <label>美国手机号（用于PayPal注册）</label>
      <input type="text" id="ppPhone" placeholder="+15828882140">
    </div>
    <div class="input-group">
      <label>短信验证码API</label>
      <input type="text" id="smsApiUrl" placeholder="https://mail-api.yuecheng.shop/api/text-relay/...">
    </div>
    <div class="toggle-container">
      <span class="toggle-label">自动模拟人工输入</span>
      <div class="toggle active" id="toggleSimulate"></div>
    </div>
    <button class="btn btn-primary" id="fetchSmsCode" style="margin-top: 8px;">获取验证码</button>
  </div>

  <div class="section">
    <div class="section-title">邮件验证码读取</div>
    <div class="input-group">
      <label>邮件读取API</label>
      <input type="text" id="emailApiUrl" placeholder="https://apple.882263.xyz/" value="https://apple.882263.xyz/">
    </div>
    <button class="btn btn-primary" id="fetchEmailCode" style="margin-top: 8px;">读取邮件验证码</button>
    <div id="emailCodeResult" style="margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; font-size: 12px; display: none;">
      <div id="emailCodeContent"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">获取支付链接</div>
    <p style="font-size: 12px; color: #8892b0; margin-bottom: 10px;">在ChatGPT页面点击获取支付长链</p>
    <button class="btn btn-primary" id="getPaymentLink">获取德区支付链接</button>
  </div>

  <div class="section">
    <div class="section-title">虚拟卡信息</div>
    <div style="margin-bottom: 8px;">
      <label style="font-size: 12px; color: #8892b0;">粘贴原始卡信息（自动解析）</label>
      <textarea class="card-info-input" id="rawCardInfo" placeholder="粘贴虚拟卡原始信息，格式：&#10;ID----卡号----有效期----CVV----手机号----姓名----地址----短信API"></textarea>
    </div>
    <button class="btn btn-success" id="parseCardInfo">解析并保存</button>
  </div>

  <div class="section">
    <div class="section-title">卡信息详情</div>
    <div class="input-group">
      <label>卡号</label>
      <input type="text" id="cardNumber" placeholder="Card Number">
    </div>
    <div class="row">
      <div class="input-group">
        <label>有效期</label>
        <input type="text" id="cardExpiry" placeholder="MM/YY">
      </div>
      <div class="input-group">
        <label>CVV</label>
        <input type="text" id="cardCvv" placeholder="CVV">
      </div>
    </div>
    <div class="input-group">
      <label>持卡人姓名</label>
      <input type="text" id="cardName" placeholder="Cardholder Name">
    </div>
    <button class="btn btn-success" id="saveCardInfo">保存卡信息</button>
  </div>

  <div class="section">
    <div class="section-title">美国地址信息</div>
    <div class="input-group">
      <label>地址</label>
      <input type="text" id="usAddress" placeholder="Street Address">
    </div>
    <div class="row">
      <div class="input-group">
        <label>城市</label>
        <input type="text" id="usCity" placeholder="City">
      </div>
      <div class="input-group">
        <label>州</label>
        <input type="text" id="usState" placeholder="State">
      </div>
    </div>
    <div class="row">
      <div class="input-group">
        <label>邮编</label>
        <input type="text" id="usZip" placeholder="ZIP Code">
      </div>
      <div class="input-group">
        <label>国家</label>
        <input type="text" id="usCountry" value="US" readonly>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">操作日志</div>
    <div class="status-bar" id="statusLog">
      <div class="status-item status-info">等待操作...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
