<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>逐字粘贴助手</title>
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #fff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    p {
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .提示 {
      padding: 10px;
      border-radius: 8px;
      background: #f2f6ff;
      color: #2453a6;
    }
  </style>
</head>
<body>
  <h1>逐字粘贴助手</h1>
  <p class="提示">在网页输入框中按 Ctrl + V，会自动将剪贴板文本逐字模拟输入。</p>
  <p>按 Esc 可以停止正在进行的模拟输入。</p>
  <script src="popup.js"></script>
</body>
</html>
